services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: goodnews
      POSTGRES_USER: goodnews
      POSTGRES_PASSWORD: goodnews
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goodnews"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://goodnews:goodnews@db/goodnews
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/good_news_board
    restart: unless-stopped
    environment:
      FASTAPI_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
